name: LocalStack WireMock Extension Tests

on:
  schedule:
    - cron: '0 2 * * 1-5'
  pull_request:
    branches:
      - main
    paths:
      - 'wiremock/**'
  push:
    branches:
      - main
    paths:
      - 'wiremock/**'
  workflow_dispatch:

env:
  LOCALSTACK_DISABLE_EVENTS: "1"
  LOCALSTACK_AUTH_TOKEN: ${{ secrets.LOCALSTACK_AUTH_TOKEN }}

jobs:
  integration-tests:
    name: Run WireMock Extension Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Terraform
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1

      - name: Set up LocalStack and extension
        run: |
          cd wiremock

          docker pull localstack/localstack-pro &
          docker pull wiremock/wiremock &
          docker pull public.ecr.aws/lambda/python:3.12 &
          pip install localstack terraform-local awscli-local[ver1]

          make install
          make lint
          make dist
          localstack extensions -v install file://"$(ls ./dist/localstack_wiremock-*.tar.gz)"

          DEBUG=1 localstack start -d
          localstack wait

      - name: Run sample app test
        run: |
          cd wiremock
          make sample-oss

      - name: Print logs
        if: always()
        run: |
          localstack logs
          localstack stop
