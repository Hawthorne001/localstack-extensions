name: LocalStack Extensions Utils Tests

on:
  schedule:
    - cron: '0 2 * * 1-5'
  push:
    paths:
      - utils/**
    branches:
      - main
  pull_request:
    paths:
      - .github/workflows/utils.yml
      - utils/**
  workflow_dispatch:

jobs:
  unit-tests:
    name: Run Unit Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd utils
          pip install -e '.[dev,test]'

      - name: Lint
        run: |
          cd utils
          make lint

      - name: Run unit tests
        run: |
          cd utils
          make test-unit

  integration-tests:
    name: Run Integration Tests
    runs-on: ubuntu-latest
    permissions:
      contents: read
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          cd utils
          pip install -e '.[dev,test]'

      - name: Run integration tests
        run: |
          docker pull moul/grpcbin &
          cd utils
          make test-integration
